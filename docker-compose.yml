services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - DEBUG=true
      - DATABASE_URL=sqlite:////app/data/amza.db

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      # Server-only: Next.js lo lee para el proxy BFF (rewrites en next.config.ts), nunca llega
      # al navegador. Apunta al hostname interno de Docker Compose, no a localhost.
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  backend_data:
